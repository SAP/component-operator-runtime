apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- resources/app.yaml
- ../bases/default

labels:
- pairs:
   {{- include "commonLabels" . | nindent 4 }}

patches:
- path: patches/credentials.yaml
  target:
    group: ""
    version: v1
    kind: Secret
    name: {{ name }}-credentials